name: CI

on:
  push:
    branches: [main]
  pull_request:

# Standing rule for sentania-labs: fork PRs don't run CI.
# Every job re-checks this via `if:` (required on job-level for PRs).

jobs:
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Install dev deps
        run: uv pip install --system -e ".[dev]"
      - name: ruff check
        run: ruff check src/ tests/
      - name: ruff format --check
        run: ruff format --check src/ tests/

  typecheck:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Install deps
        run: uv pip install --system -e ".[dev]"
      - name: mypy
        run: mypy src/deep_analysis_agent/

  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Install deps
        run: uv pip install --system -e ".[dev]"
      - name: pytest
        run: pytest tests/ -v

  diagram-drift:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Render diagrams
        working-directory: docs/diagrams
        run: |
          uv sync
          uv run playwright install --with-deps chromium
          for f in *.excalidraw; do
            uv run python render.py "$f"
          done
      - name: Fail on diagram drift
        run: git diff --exit-code docs/diagrams/*.png
      - name: Upload rendered PNGs on drift
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-diagrams
          path: docs/diagrams/*.png

  build-windows:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: windows-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Install deps (dev + build)
        run: uv pip install --system -e ".[dev,build]"
      - name: Build with PyInstaller
        run: uv run pyinstaller build/windows/deep-analysis-agent.spec --noconfirm
      - name: Verify exe produced
        run: |
          if (-not (Test-Path "dist/deep-analysis-agent/DeepAnalysisAgent.exe")) {
            Write-Error "DeepAnalysisAgent.exe not found"
            exit 1
          }
          Write-Host "Build OK: dist/deep-analysis-agent/DeepAnalysisAgent.exe"
        shell: pwsh
      - name: Smoke-test the frozen exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # GUI-subsystem exe (console=False) — must Start-Process with -Wait
          # so pwsh waits for the process to exit and captures its code.
          $proc = Start-Process -FilePath "dist/deep-analysis-agent/DeepAnalysisAgent.exe" `
                                 -ArgumentList "--version" -Wait -PassThru
          Write-Host "Exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            throw "frozen exe smoke test failed (exit $($proc.ExitCode))"
          }
